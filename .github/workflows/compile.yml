name: Build LaTeX CV

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile Spanish CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: es/cv_es.tex
          working_directory: es/

      - name: Compile English CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: en/cv_en.tex
          working_directory: en/

      - name: Upload PDF Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CV_PDFs
          path: |
            es/cv_es.pdf
            en/cv_en.pdf

      - name: Release PDFs (Optional)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            es/cv_es.pdf
            en/cv_en.pdf
          tag_name: latest
          name: Latest CV PDFs
          body: "Automated build of the latest CV in Spanish and English."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
